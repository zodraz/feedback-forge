version: '3.8'

# Development docker-compose with hot reload
services:
  # Backend API (development mode)
  backend:
    build:
      context: .
      dockerfile: feedbackforge/Dockerfile
    container_name: feedbackforge-backend-dev
    ports:
      - "8081:8081"
    environment:
      - COSMOS_DB_ENDPOINT=${COSMOS_DB_ENDPOINT}
      - COSMOS_DB_KEY=${COSMOS_DB_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_SEARCH_ENDPOINT=${AZURE_SEARCH_ENDPOINT}
      - AZURE_SEARCH_API_KEY=${AZURE_SEARCH_API_KEY}
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    volumes:
      - ./feedbackforge:/app/feedbackforge
    depends_on:
      - redis
    networks:
      - feedbackforge
    restart: unless-stopped
    command: ["python", "-m", "feedbackforge", "serve", "--port", "8081", "--host", "0.0.0.0", "--reload"]

  # Dashboard (development with hot reload)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    container_name: feedbackforge-dashboard-dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8081/api
      - VITE_AG_UI_URL=http://localhost:8081/agent
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/public:/app/public
      - ./dashboard/.env:/app/.env
    depends_on:
      - backend
    networks:
      - feedbackforge
    restart: unless-stopped

  # FAQ Viewer (development with hot reload)
  faqs:
    build:
      context: ./faqs
      dockerfile: Dockerfile.dev
    container_name: feedbackforge-faqs-dev
    ports:
      - "3002:3002"
    environment:
      - VITE_API_BASE_URL=http://localhost:8081/api
    volumes:
      - ./faqs/src:/app/src
      - ./faqs/public:/app/public
      - ./faqs/.env:/app/.env
    depends_on:
      - backend
    networks:
      - feedbackforge
    restart: unless-stopped

  # Redis (for session management)
  redis:
    image: redis:7-alpine
    container_name: feedbackforge-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    networks:
      - feedbackforge
    restart: unless-stopped

networks:
  feedbackforge:
    driver: bridge

volumes:
  redis-data-dev:
    driver: local
