name: Auto Version Bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  version-bump:
    name: Bump Version and Tag
    runs-on: ubuntu-latest

    # Only run if commit doesn't already have a version tag
    if: "!startsWith(github.event.head_commit.message, 'bump:')"

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump type
        id: bump-type
        run: |
          # Check commit message for version bump hints
          MESSAGE="${{ github.event.head_commit.message }}"

          if [[ "$MESSAGE" =~ ^(BREAKING|breaking|major:) ]]; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif [[ "$MESSAGE" =~ ^(feat|feature|minor:) ]]; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif [[ "$MESSAGE" =~ ^(fix|patch:) ]]; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            # Default to patch for regular commits
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version and create tag
        id: version
        uses: anothrNick/github-tag-action@1.67.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: ${{ steps.bump-type.outputs.bump }}
          RELEASE_BRANCHES: main
          PRERELEASE: false

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          release_name: Release ${{ steps.version.outputs.new_tag }}
          body: |
            ## Changes in ${{ steps.version.outputs.new_tag }}

            **Previous version:** ${{ steps.version.outputs.tag }}
            **Bump type:** ${{ steps.bump-type.outputs.bump }}

            Commit: ${{ github.event.head_commit.message }}

            ### Docker Images
            ```
            docker pull ${{ secrets.ACR_REGISTRY }}/feedbackforge-backend:${{ steps.version.outputs.new_tag }}
            docker pull ${{ secrets.ACR_REGISTRY }}/feedbackforge-dashboard:${{ steps.version.outputs.new_tag }}
            docker pull ${{ secrets.ACR_REGISTRY }}/feedbackforge-faqs:${{ steps.version.outputs.new_tag }}
            ```
          draft: false
          prerelease: false

      - name: Output new version
        run: |
          echo "## Version Bumped 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Previous:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New:** ${{ steps.version.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump type:** ${{ steps.bump-type.outputs.bump }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Docker build will be triggered automatically with new version tag." >> $GITHUB_STEP_SUMMARY
