  # Dashboard (Executive chat interface)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: feedbackforge-dashboard
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:8081/api
      - VITE_AG_UI_URL=http://backend:8081/agent
    depends_on:
      - backend
    networks:
      - feedbackforge
    restart: unless-stopped

  # FAQ Viewer
  faqs:
    build:
      context: ./faqs
      dockerfile: Dockerfile
    container_name: feedbackforge-faqs
    ports:
      - "3002:3002"
    environment:
      - VITE_API_BASE_URL=http://backend:8081/api
    depends_on:
      - backend
    networks:
      - feedbackforge
    restart: unless-stopped

