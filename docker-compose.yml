version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: feedbackforge/Dockerfile
    container_name: feedbackforge-backend
    ports:
      - "8081:8081"
    environment:
      # Load from .env file
      - COSMOS_DB_ENDPOINT=${COSMOS_DB_ENDPOINT}
      - COSMOS_DB_KEY=${COSMOS_DB_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_SEARCH_ENDPOINT=${AZURE_SEARCH_ENDPOINT}
      - AZURE_SEARCH_API_KEY=${AZURE_SEARCH_API_KEY}
      # Azure Redis Cache (managed)
      - REDIS_URL=${REDIS_URL}
      # Azure Service Principal for DefaultAzureCredential
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      # MCP Server URL for data sync agent
      - FEEDBACKFORGE_MCP_URL=http://mcp-server:8085
      - FEEDBACKFORGE_USE_MCP=false
      # Workflow report output path
      - WORKFLOW_REPORT_PATH=/mnt/reports
      # Note: Zendesk credentials NOT needed here - MCP server handles all Zendesk communication
    env_file:
      - .env
    volumes:
      - workflow-reports:/mnt/reports
    depends_on:
      - mcp-server
    networks:
      - feedbackforge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MCP Server (Model Context Protocol - for Zendesk integration)
  mcp-server:
    build:
      context: .
      dockerfile: feedbackforge/Dockerfile
    container_name: feedbackforge-mcp
    ports:
      - "8085:8085"
    command: ["python", "-m", "feedbackforge", "mcp", "--transport", "sse", "--host", "0.0.0.0", "--port", "8085"]
    environment:
      # Zendesk credentials
      - ZENDESK_SUBDOMAIN=${ZENDESK_SUBDOMAIN}
      - ZENDESK_EMAIL=${ZENDESK_EMAIL}
      - ZENDESK_API_TOKEN=${ZENDESK_API_TOKEN}
      # Cosmos DB for data store
      - COSMOS_DB_ENDPOINT=${COSMOS_DB_ENDPOINT}
      - COSMOS_DB_KEY=${COSMOS_DB_KEY}
      # Azure credentials
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
    env_file:
      - .env
    networks:
      - feedbackforge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  
  action-planner:
    build:
      context: .
      dockerfile: action-planner/Dockerfile
    container_name: action-planner
    ports:
      - "8084:8084"
    environment:
      # Azure OpenAI / Azure AI Project
      - AZURE_AI_PROJECT_ENDPOINT=${AZURE_AI_PROJECT_ENDPOINT}
      - AZURE_OPENAI_RESPONSES_DEPLOYMENT_NAME=${AZURE_OPENAI_RESPONSES_DEPLOYMENT_NAME}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      # Jira (optional)
      - JIRA_URL=${JIRA_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - JIRA_PROJECT_KEY=${JIRA_PROJECT_KEY}
      # Server
      - HOST=0.0.0.0
      - PORT=8084
      - LOG_LEVEL=INFO
    env_file:
      - .env
    networks:
      - feedbackforge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  # Workflow (one-time execution)
  workflow:
    build:
      context: .
      dockerfile: feedbackforge/Workflow.Dockerfile
    container_name: feedbackforge-workflow
    command: ["python", "-m", "feedbackforge", "workflow", "--max-surveys", "20"]
    environment:
      # Load from .env file
      - COSMOS_DB_ENDPOINT=${COSMOS_DB_ENDPOINT}
      - COSMOS_DB_KEY=${COSMOS_DB_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_SEARCH_ENDPOINT=${AZURE_SEARCH_ENDPOINT}
      - AZURE_SEARCH_API_KEY=${AZURE_SEARCH_API_KEY}
      # Azure Redis Cache (managed)
      - REDIS_URL=${REDIS_URL}
      # Azure Service Principal for DefaultAzureCredential
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      # Workflow report output path
      - WORKFLOW_REPORT_PATH=/mnt/reports
    env_file:
      - .env
    volumes:
      - workflow-reports:/mnt/reports
    # depends_on:
    #   - redis  # Disabled when using Azure Redis Cache
    networks:
      - feedbackforge
    restart: "no"  # Run once and stop (don't restart)

  # Create FAQS
  create-faqs:
    build:
      context: .
      dockerfile: feedbackforge/CreateFAQs.Dockerfile
    container_name: feedbackforge-create-faqs
    ports:
      - "8083:8083"
    environment:
      # Load from .env file
      - COSMOS_DB_ENDPOINT=${COSMOS_DB_ENDPOINT}
      - COSMOS_DB_KEY=${COSMOS_DB_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_SEARCH_ENDPOINT=${AZURE_SEARCH_ENDPOINT}
      - AZURE_SEARCH_API_KEY=${AZURE_SEARCH_API_KEY}
      # Azure Redis Cache (managed)
      - REDIS_URL=${REDIS_URL}
      # Azure Service Principal for DefaultAzureCredential
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
    env_file:
      - .env
    # depends_on:
    #   - redis  # Disabled when using Azure Redis Cache
    networks:
      - feedbackforge
    # restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Dashboard (Executive chat interface)
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8081/api
        VITE_AG_UI_URL: http://localhost:8081/agent
    container_name: feedbackforge-dashboard
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8081/api
      - VITE_AG_UI_URL=http://localhost:8081/agent
    depends_on:
      - backend
    networks:
      - feedbackforge
    restart: unless-stopped

  #FAQ Viewer
  faqs:
    build:
      context: ./faqs
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://backend:8081/api
    container_name: feedbackforge-faqs
    ports:
      - "3002:3002"
    environment:
      - VITE_API_BASE_URL=http://backend:8081/api
    # depends_on:
    #   - backend
    networks:
      - feedbackforge
    restart: unless-stopped

  # Redis (for session management) - DISABLED: Using Azure Redis Cache
  # Uncomment below to use local Redis instead of Azure Redis Cache
  redis:
    image: redis:7-alpine
    container_name: feedbackforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - feedbackforge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  feedbackforge:
    driver: bridge

volumes:
  redis-data:
    driver: local
  workflow-reports:
    driver: local
    # Alternative: Use bind mount to local directory
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: ./reports
